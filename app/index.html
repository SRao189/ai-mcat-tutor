<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MCAT Tutor</title>
  <style>
    :root {
      --bg: #f6f7f8;
      --surface: #fff;
      --surface-alt: #f0f2f4;
      --text: #171a1f;
      --muted: #59636e;
      --border: #d9dee3;
      --border-strong: #b8c0c8;
      --accent: #155f52;
      --good: #12623b;
      --attention: #8a4d12;
      --radius: 5px;
    }

    * { box-sizing: border-box; }

    html {
      background: var(--bg);
      color: var(--text);
      font: 16px/1.55 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
    }

    button {
      font: inherit;
    }

    button:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(21, 95, 82, 0.28);
      outline-offset: 2px;
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 0 22px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .brand {
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 0;
      font-weight: 750;
      cursor: pointer;
    }

    .nav {
      display: flex;
      gap: 4px;
    }

    .nav button {
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      padding: 6px 10px;
      cursor: pointer;
    }

    .nav button:hover {
      background: var(--surface-alt);
      color: var(--text);
    }

    .nav button.active {
      border-color: var(--border);
      background: var(--surface);
      color: var(--text);
    }

    .top-spacer { flex: 1; }

    .progress {
      width: min(280px, 30vw);
      color: var(--muted);
      font-size: 12px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 5px;
    }

    .progress-track {
      height: 5px;
      overflow: hidden;
      border-radius: var(--radius);
      background: #d8dde2;
    }

    .progress-track span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--accent);
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 34px 24px 72px;
    }

    .page.narrow {
      max-width: 760px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    p {
      overflow-wrap: anywhere;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .section {
      margin-top: 30px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .list {
      border-top: 1px solid var(--border);
    }

    .row {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 15px 16px;
      text-align: left;
      text-decoration: none;
      cursor: pointer;
    }

    .row:hover {
      background: #fbfcfc;
    }

    .row-title {
      margin: 0;
      font-weight: 720;
      overflow-wrap: anywhere;
    }

    .row-meta {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .row-status {
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
      white-space: nowrap;
    }

    .row-status.mastered { color: var(--good); }
    .row-status.review { color: var(--attention); }

    .unit {
      margin-top: 28px;
    }

    .unit:first-child {
      margin-top: 0;
    }

    .unit-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .unit-progress {
      color: var(--muted);
      font-size: 14px;
    }

    .load-error {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      color: #9a2f2f;
    }

    @media (max-width: 720px) {
      .topbar {
        gap: 12px;
        padding: 0 14px;
      }

      .progress {
        display: none;
      }

      .page {
        padding: 24px 16px 56px;
      }

      h1 {
        font-size: 25px;
      }

      .row,
      .unit-header {
        grid-template-columns: 1fr;
      }

      .row {
        gap: 6px;
      }

      .unit-header {
        display: block;
      }

      .row-status {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <button class="brand" id="brand" type="button">MCAT Tutor</button>
    <nav class="nav" aria-label="Primary">
      <button id="homeNav" type="button">Home</button>
      <button id="courseNav" type="button">Course</button>
    </nav>
    <div class="top-spacer"></div>
    <div class="progress" aria-label="Course progress">
      <div class="progress-row">
        <span id="progressText">Loading</span>
        <span id="reviewText"></span>
      </div>
      <div class="progress-track"><span id="progressFill"></span></div>
    </div>
  </header>

  <main id="app" class="page narrow">
    <h1>MCAT Tutor</h1>
    <p class="subtitle">Loading course data.</p>
  </main>

  <script>
  (function () {
    "use strict";

    var MODULE_FILES = Array.from({ length: 11 }, function (_, index) {
      return "/course-data/module-" + (index + 1) + ".json";
    });
    var STORAGE_KEY = "mcatTutorProgress.v4";
    var modules = [];
    var route = new URLSearchParams(window.location.search).get("screen") === "course" ? "course" : "home";

    var app = document.getElementById("app");
    var homeNav = document.getElementById("homeNav");
    var courseNav = document.getElementById("courseNav");
    var progressText = document.getElementById("progressText");
    var reviewText = document.getElementById("reviewText");
    var progressFill = document.getElementById("progressFill");

    function loadProgress() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{\"lessons\":{}}");
      } catch (_error) {
        return { lessons: {} };
      }
    }

    function stateFor(id) {
      return loadProgress().lessons[id] || {};
    }

    function scoreFor(id) {
      var state = stateFor(id);
      if (!state.total) return null;
      return Math.round((state.score / state.total) * 100);
    }

    function statusFor(id) {
      var state = stateFor(id);
      var score = scoreFor(id);
      if (state.completed) return { text: "Mastered", className: " mastered" };
      if (state.needsReview) return { text: score === null ? "Review" : "Review " + score + "%", className: " review" };
      return { text: score === null ? "Unlocked" : score + "%", className: "" };
    }

    function completedCount() {
      return modules.filter(function (module) { return stateFor(module.id).completed; }).length;
    }

    function reviewCount() {
      return modules.filter(function (module) { return stateFor(module.id).needsReview; }).length;
    }

    function nextModule() {
      return modules.find(function (module) { return !stateFor(module.id).completed; }) || modules[0];
    }

    function lessonHref(module) {
      return "/learn?module=" + encodeURIComponent(module.id);
    }

    function moduleMeta(module) {
      return (module.sections || []).length + " concepts · " + (module.checks || []).length + " checks";
    }

    function subjectName() {
      return "Biochemistry";
    }

    function unitName() {
      return "Unit 1: Biochemistry modules";
    }

    function setRoute(next) {
      route = next;
      history.replaceState(null, "", next === "course" ? "?screen=course" : window.location.pathname);
      render();
    }

    function renderChrome() {
      homeNav.className = route === "home" ? "active" : "";
      courseNav.className = route === "course" ? "active" : "";
      var total = modules.length;
      var done = completedCount();
      progressText.textContent = done + " of " + total + " complete";
      reviewText.textContent = reviewCount() + " review";
      progressFill.style.width = total ? Math.round((done / total) * 100) + "%" : "0%";
    }

    function render() {
      renderChrome();
      if (route === "course") renderCourse();
      else renderHome();
    }

    function renderHome() {
      app.className = "page narrow";
      app.innerHTML = "";
      app.appendChild(node("h1", "", "MCAT Tutor"));
      var next = nextModule();
      if (next) {
        var score = scoreFor(next.id);
        app.appendChild(node("p", "subtitle", "Continue: " + next.title + (score === null ? "" : " · " + score + "%")));
        var block = node("section", "section");
        block.appendChild(row(next.title, subjectName() + " · " + moduleMeta(next), statusFor(next.id), lessonHref(next)));
        app.appendChild(block);
      }

      var plan = node("section", "section");
      plan.appendChild(node("h2", "section-title", "Study plan"));
      var list = node("div", "list");
      var done = completedCount();
      list.appendChild(row(subjectName(), done + " of " + modules.length + " lessons mastered", { text: "View course", className: "" }, "#course"));
      plan.appendChild(list);
      app.appendChild(plan);

      var mistakes = recentMistakes();
      if (mistakes.length) {
        var recent = node("section", "section");
        recent.appendChild(node("h2", "section-title", "Recent mistakes"));
        var mistakeList = node("div", "list");
        mistakes.slice(0, 4).forEach(function (item) {
          mistakeList.appendChild(row(item.target, item.title, { text: "Review", className: " review" }, lessonHref(item.module)));
        });
        recent.appendChild(mistakeList);
        app.appendChild(recent);
      }
    }

    function renderCourse() {
      app.className = "page";
      app.innerHTML = "";
      app.appendChild(node("h1", "", subjectName()));
      app.appendChild(node("p", "subtitle", "Lessons are listed in course-data order. All lessons are unlocked because no prerequisite data exists in the module JSON."));

      var course = node("section", "section");
      var unit = node("section", "unit");
      var header = node("div", "unit-header");
      header.appendChild(node("h2", "", unitName()));
      header.appendChild(node("span", "unit-progress", completedCount() + " of " + modules.length + " lessons"));
      unit.appendChild(header);
      var list = node("div", "list");
      modules.forEach(function (module) {
        list.appendChild(row(module.title, moduleMeta(module), statusFor(module.id), lessonHref(module)));
      });
      unit.appendChild(list);
      course.appendChild(unit);
      app.appendChild(course);
    }

    function recentMistakes() {
      var items = [];
      modules.forEach(function (module) {
        (stateFor(module.id).recentMistakes || []).forEach(function (target) {
          items.push({ module: module, title: module.title, target: target });
        });
      });
      return items;
    }

    function row(title, meta, status, href) {
      var link = document.createElement("a");
      link.className = "row";
      link.href = href;
      if (href === "#course") {
        link.addEventListener("click", function (event) {
          event.preventDefault();
          setRoute("course");
        });
      }
      var copy = node("div");
      copy.appendChild(node("p", "row-title", title));
      copy.appendChild(node("p", "row-meta", meta));
      link.appendChild(copy);
      link.appendChild(node("span", "row-status" + status.className, status.text));
      return link;
    }

    function node(tag, className, text) {
      var element = document.createElement(tag);
      if (className) element.className = className;
      if (text !== undefined) element.textContent = text;
      return element;
    }

    function showError(error) {
      app.className = "page narrow";
      app.innerHTML = "";
      app.appendChild(node("h1", "", "MCAT Tutor"));
      app.appendChild(node("p", "load-error", "Course data could not load: " + error.message));
      progressText.textContent = "0 of 0 complete";
      reviewText.textContent = "";
    }

    document.getElementById("brand").addEventListener("click", function () { setRoute("home"); });
    homeNav.addEventListener("click", function () { setRoute("home"); });
    courseNav.addEventListener("click", function () { setRoute("course"); });

    Promise.all(MODULE_FILES.map(function (file) {
      return fetch(file).then(function (response) {
        if (!response.ok) throw new Error(file + " returned " + response.status);
        return response.json();
      });
    }))
      .then(function (loaded) {
        modules = loaded;
        render();
      })
      .catch(showError);
  }());
  </script>
</body>
</html>
